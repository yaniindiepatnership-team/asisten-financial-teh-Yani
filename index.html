<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMersWallet - Asisten Keuangan Pribadi & Bisnis</title>
    <!-- Tailwind CSS untuk Desain Responsif & Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ApexCharts untuk Visualisasi Data Finansial -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <!-- Lucide Icons untuk Ikon Premium Modern -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Font Plus Jakarta Sans Premium dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --dana-blue: #108EE9; 
            --dana-dark: #096BC4;
            --dana-light: #F3F7FA;
            --emerald: #10B981;
            --rose: #F43F5E;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--dana-light); 
            color: #1E293B; 
        }
        .bg-dana { background-color: var(--dana-blue); }
        .bg-dana-dark { background-color: var(--dana-dark); }
        .text-dana { color: var(--dana-blue); }
        
        /* Bayangan Kartu Premium ala Fintech */
        .card-shadow { 
            background-color: #FFFFFF;
            box-shadow: 0 16px 40px -12px rgba(16, 142, 233, 0.12), 0 4px 12px -4px rgba(0, 0, 0, 0.03); 
            border: 1px solid rgba(16, 142, 233, 0.05);
        }
        
        /* Shadow Glow untuk Kartu Biru Utama */
        .blue-glow {
            box-shadow: 0 20px 40px -12px rgba(16, 142, 233, 0.45);
        }

        .bottom-nav { 
            box-shadow: 0 -10px 30px rgba(16, 142, 233, 0.08); 
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        /* Animasi Transisi Halaman */
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Animasi Getar untuk PIN Salah */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }

        /* Animasi Garis Tepi Warna-Warni untuk Lockscreen */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-glow-spin {
            0% { --angle: 0deg; }
            100% { --angle: 360deg; }
        }

        .colorful-shadow-border {
            position: relative;
            border: none !important;
        }
        
        .colorful-shadow-border::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 3px;
            background: conic-gradient(
                from var(--angle), 
                #108EE9, 
                #8B5CF6, 
                #F43F5E, 
                #F59E0B, 
                #10B981, 
                #108EE9
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: border-glow-spin 4s linear infinite;
            pointer-events: none;
        }

        /* Tombol PIN Timbul (Soft 3D / Embossed style) */
        .btn-timbul {
            box-shadow: 5px 5px 12px rgba(16, 142, 233, 0.08), 
                       -5px -5px 12px rgba(255, 255, 255, 0.9),
                       inset 1px 1px 2px rgba(255, 255, 255, 1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: linear-gradient(135deg, #ffffff, #f4f7fb);
        }
        .btn-timbul:active {
            box-shadow: inset 4px 4px 8px rgba(16, 142, 233, 0.1), 
                        inset -4px -4px 8px rgba(255, 255, 255, 0.8);
            background: #f0f4f8;
            border-color: transparent;
        }

        /* Logo transparan */
        .logo-transparent-wrap {
            background: transparent !important;
            box-shadow: none !important;
            border: 0 !important;
            overflow: visible !important;
        }
        .logo-transparent-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
            border-radius: 0 !important;
        }
        #lockscreen-logo-container,
        #lockscreen-logo-container img {
            background: transparent !important;
            box-shadow: none !important;
            border: 0 !important;
        }

        /* Progress Bar Kustom untuk Hutang */
        .progress-bar-wrap {
            width: 100%;
            height: 8px;
            background-color: #E2E8F0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: #06B6D4;
            border-radius: 4px;
            transition: width 0.5s ease-in-out;
        }
        .progress-bar-fill-green {
            background-color: #10B981;
        }
    </style>
</head>
<body class="pb-24 lg:pb-0 min-h-screen flex flex-col lg:flex-row font-sans">

    <!-- SCREEN LOCK PIN 6-DIGIT -->
    <div id="pin-lockscreen" class="fixed inset-0 bg-white/90 z-[150] flex flex-col items-center justify-center p-4 sm:p-6 backdrop-blur-xl">
        <div class="w-full max-w-sm flex flex-col items-center space-y-5 sm:space-y-8 animate-fade bg-white p-6 sm:p-10 rounded-[40px] colorful-shadow-border" id="pin-container-box">
            
            <input type="password" id="real-pin-input" class="absolute -top-40 opacity-0 w-1 h-1 pointer-events-none" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">

            <div class="text-center space-y-1 sm:space-y-2">
                <div id="lockscreen-logo-container" class="cursor-pointer flex justify-center w-full" onclick="focusPinInput()">
                </div>
                <h2 class="text-2xl sm:text-3xl font-black mt-2 sm:mt-4 text-slate-800"><span class="text-[#108EE9]">iMers</span>WALLET</h2>
                <p class="text-xs sm:text-sm text-slate-400 font-semibold">Masukkan PIN 6-Digit</p>
            </div>

            <div class="flex gap-3 sm:gap-4 justify-center py-2 sm:py-4 cursor-pointer" id="pin-dots" onclick="focusPinInput()">
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full bg-slate-200 shadow-inner transition-all duration-200"></div>
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full bg-slate-200 shadow-inner transition-all duration-200"></div>
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full bg-slate-200 shadow-inner transition-all duration-200"></div>
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full bg-slate-200 shadow-inner transition-all duration-200"></div>
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full bg-slate-200 shadow-inner transition-all duration-200"></div>
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full bg-slate-200 shadow-inner transition-all duration-200"></div>
            </div>

            <div class="grid grid-cols-3 gap-3 sm:gap-5 w-full max-w-[280px]">
                <button onclick="pressPinNumber(1)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">1</button>
                <button onclick="pressPinNumber(2)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">2</button>
                <button onclick="pressPinNumber(3)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">3</button>
                
                <button onclick="pressPinNumber(4)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">4</button>
                <button onclick="pressPinNumber(5)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">5</button>
                <button onclick="pressPinNumber(6)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">6</button>
                
                <button onclick="pressPinNumber(7)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">7</button>
                <button onclick="pressPinNumber(8)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">8</button>
                <button onclick="pressPinNumber(9)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">9</button>
                
                <button onclick="clearPin()" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-400 font-bold text-[10px] sm:text-xs flex items-center justify-center hover:text-slate-600 transition-all outline-none font-sans">Hapus</button>
                <button onclick="pressPinNumber(0)" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-slate-700 font-black text-xl sm:text-2xl flex items-center justify-center hover:text-dana transition-all outline-none">0</button>
                <button onclick="backspacePin()" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full btn-timbul text-rose-500 font-bold flex items-center justify-center hover:text-rose-600 transition-all outline-none">
                    <i data-lucide="delete" class="w-5 h-5 sm:w-6 sm:h-6 mx-auto"></i>
                </button>
            </div>

            <div class="text-center pt-1 sm:pt-2">
                <button onclick="requestForgotPin()" class="text-[10px] sm:text-xs text-dana hover:text-blue-600 font-bold tracking-wide transition-colors flex items-center gap-1.5 mx-auto">
                    <i data-lucide="key-round" class="w-3 h-3 sm:w-3.5 sm:h-3.5"></i> Lupa PIN? Kirim via WA & Email
                </button>
            </div>
        </div>
    </div>

                <i data-lucide="pie-chart" class="w-5 h-5"></i>

                <span>Kategori Dinamis</span>

                <i data-lucide="handshake" class="w-5 h-5"></i>
                <span>Wallet Debt</span>
            </button>
            <button onclick="router('walletReport')" id="side-walletReport" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm transition-all text-purple-500 hover:text-purple-600 hover:bg-purple-50/50">
                <i data-lucide="file-text" class="w-5 h-5"></i>
                <span>Wallet Report</span>
            </button>
            <button onclick="router('walletChat')" id="side-walletChat" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm transition-all text-cyan-500 hover:text-cyan-600 hover:bg-cyan-50/50">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                <span>Wallet Chat</span>
            </button>
            <button onclick="router('users')" id="side-users" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm transition-all text-rose-500 hover:text-rose-600 hover:bg-rose-50/50">
                <i data-lucide="users-round" class="w-5 h-5"></i>
                <span>Users & Access</span>
            </button>
            <button onclick="router('profile')" id="side-profile" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm transition-all text-indigo-500 hover:text-indigo-600 hover:bg-indigo-50/50">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>Pengaturan Bot</span>
            </button>
            
            <button onclick="logout()" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-sm text-red-500 hover:bg-red-50 transition-all mt-4">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span>Keluar Sesi</span>
            </button>
        </nav>

        <div class="bg-gradient-to-br from-blue-50 to-white border border-blue-100 rounded-3xl p-5 space-y-3 card-shadow mt-4">
            <div class="flex items-center gap-2 text-dana">
                <i data-lucide="sparkles" class="w-5 h-5 animate-pulse"></i>
                <span class="text-xs font-black uppercase tracking-wider">Catat Cepat</span>
            </div>
            <p class="text-xs text-slate-500 font-medium leading-relaxed font-semibold">Kirim chat WA ke bot asisten untuk mencatatkan pemasukan secara instan.</p>
            <a id="desktop-wa-btn" href="#" target="_blank" class="w-full py-3 bg-[#108EE9] hover:bg-[#096BC4] text-white rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 transition-all shadow-[0_8px_20px_-6px_rgba(16,142,233,0.4)] hover:shadow-[0_10px_25px_-6px_rgba(16,142,233,0.5)] hover:-translate-y-0.5">
                <i data-lucide="message-square" class="w-4 h-4"></i> Chat Asisten WA
            </a>
        </div>

        <div class="pt-2">
            <p id="sidebar-footer-text" class="text-[10px] text-slate-400 font-bold leading-relaxed px-2 text-center">
                Developed by Terry Katar | iMersnesia.com
            </p>
        </div>
    </aside>

    <main class="flex-1 min-w-0 relative z-10 h-screen overflow-y-auto">
        <div id="app" class="w-full">
            <div id="global-loader" class="fixed inset-0 bg-white/80 backdrop-blur-md z-[100] flex items-center justify-center">
                <div class="flex flex-col items-center gap-4 bg-white p-8 rounded-[32px] card-shadow">
                    <div class="w-12 h-12 border-4 border-blue-100 border-t-dana rounded-full animate-spin"></div>
                    <p class="text-sm font-bold text-slate-600">Sinkronisasi Pangkalan Data...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Navigasi Bawah Khusus HP -->

        <button onclick="router('home')" id="nav-home" class="flex flex-col items-center gap-1 transition-all text-blue-600">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold">Utama</span>
        </button>
        <button onclick="router('history')" id="nav-history" class="flex flex-col items-center gap-1 transition-all text-amber-500">

            <span class="text-[9px] font-bold">Riwayat</span>
        </button>
        
        <!-- FAB Floating Button TENGAH -->

                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">

            <div class="grid grid-cols-4 gap-4 gap-y-6">

                    <span class="text-[10px] font-bold text-slate-600">Report</span>

                <button onclick="routerAndCloseMenu('walletDebt')" class="flex flex-col items-center gap-2 group">

                    <span class="text-[10px] font-bold text-slate-600">Pengaturan</span>
                </button>

        function handlePinInput(val) {
            const input = document.getElementById('real-pin-input');

            if (val.length > 6) val = val.slice(0, 6);
            state.enteredPin = val;
            if (input && input.value !== val) {
                input.value = val;
            }
            updatePinIndicators();
            if (state.enteredPin.length === 6) verifyPin();
        }

        function pressPinNumber(num) {
            if (state.enteredPin.length < 6) {
                const newVal = state.enteredPin + num;

        function updatePinIndicators() {
            const dots = document.querySelectorAll('#pin-dots div');
            const colorfulClasses = [
                'bg-[#108EE9] shadow-[#108EE9]/50',
                'bg-[#8B5CF6] shadow-[#8B5CF6]/50',
                'bg-[#F43F5E] shadow-[#F43F5E]/50',

                'bg-[#10B981] shadow-[#10B981]/50',
                'bg-[#06B6D4] shadow-[#06B6D4]/50' 
            ];

            dots.forEach((dot, index) => {
                if (index < state.enteredPin.length) {
                    dot.className = `w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full ${colorfulClasses[index]} scale-125 transition-all duration-200 shadow-md`;

        async function fetchWithTimeout(resource, options = {}) {
            const { timeout, ...fetchOptions } = options; 
            return fetch(resource, {

                cache: fetchOptions.cache || "no-store"

            try {

                if (result && result.status === 'success') {

        async function fetchDashboardData(isInitialLoad = false) {
            state.isLoading = true;
            const loader = document.getElementById("global-loader");
            if (!isInitialLoad && loader) loader.classList.remove("hidden");

            try {
                const response = await fetchWithTimeout(`${CONFIG.API_URL}?action=getDashboard&ts=${Date.now()}`, { timeout: 15000 });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                let result;
                try { result = JSON.parse(text); } catch (jsonErr) { throw new Error("Apps Script tidak mengembalikan JSON valid."); }
                if (!result || result.status !== "success") throw new Error(result?.message || "Format response getDashboard tidak sesuai.");
                
                if (!Array.isArray(result.transactions)) result.transactions = [];
                if (!result.stats) {
                    const inc = result.transactions.filter(t => t.type === "income").reduce((a, b) => a + Number(b.amount || 0), 0);
                    const exp = result.transactions.filter(t => t.type === "expense").reduce((a, b) => a + Number(b.amount || 0), 0);
                    result.stats = { income: inc, expense: exp, balance: inc - exp };
                }
                if (!result.settings) result.settings = {};

                if (result.debts) state.data.debts = result.debts;
                if (result.debtPayments) state.data.debtPayments = result.debtPayments;
                
                // Load Kategori dari Backend jika ada
                if (result.categories) state.data.categories = result.categories;

                state.data = result;
                state.isUsingDemo = false;
                CONFIG.BOT_NUMBER = result.settings.BOT_NUMBER || CONFIG.BOT_NUMBER;

        function buildLocalWalletReport(wallet, month, year) {
            const walletLabel = wallet === 'all' ? 'Semua Dompet Aktif' : getWalletLabel(wallet);
            const monthName = document.querySelector(`#report-month option[value="${month}"]`)?.textContent || '';
            const filtered = (state.data.transactions || []).filter(t => {
                const d = new Date(t.date);
                if (isNaN(d.getTime())) return false;
                const matchMonth = d.getMonth() + 1 === Number(month);
                const matchYear = d.getFullYear() === Number(year);
                const matchWallet = wallet === 'all' || String(t.wallet || getDefaultWalletName()) === String(wallet);
                return matchMonth && matchYear && matchWallet;
            });
            const incomeByCategory = {};
            const expenseByCategory = {};
            let income = 0, expense = 0;
            filtered.forEach(t => {
                const amount = Number(t.amount || 0);
                const cat = t.category || 'Lainnya';
                if (t.type === 'income') {
                    income += amount;
                    incomeByCategory[cat] = (incomeByCategory[cat] || 0) + amount;
                } else {
                    expense += amount;
                    expenseByCategory[cat] = (expenseByCategory[cat] || 0) + amount;
                }
            });
            const toRows = obj => Object.keys(obj).map(category => ({ category, total: obj[category] })).sort((a, b) => b.total - a.total);
            const incomeRows = toRows(incomeByCategory);
            const expenseRows = toRows(expenseByCategory);
            const topIncome = incomeRows[0] || null;
            const topExpense = expenseRows[0] || null;
            const balance = income - expense;
            const notes = [
                topIncome ? `High income terbesar berasal dari kategori ${topIncome.category} sebesar ${formatIDR(topIncome.total)}.` : 'Belum ada pemasukan pada periode ini.',
                topExpense ? `High expenses terbesar berasal dari kategori ${topExpense.category} sebesar ${formatIDR(topExpense.total)}.` : 'Belum ada pengeluaran pada periode ini.',
                balance > 0 ? `Cashflow ${walletLabel} positif sebesar ${formatIDR(balance)}.` : balance < 0 ? `Cashflow ${walletLabel} minus sebesar ${formatIDR(balance)}.` : `Cashflow ${walletLabel} netral pada periode ini.`
            ];
            return {
                wallet, walletLabel, month: Number(month), year: Number(year), periodLabel: `${monthName} ${year}`,
                generatedAt: new Date().toLocaleString('id-ID'),
                summary: { income, expense, balance, transactionCount: filtered.length },
                incomeByCategory: incomeRows,
                expenseByCategory: expenseRows,
                topIncome,
                topExpense,
                notes,
                transactions: filtered.map(t => ({ ...t, walletLabel: getWalletLabel(t.wallet) }))
            };
        }

        function pushWalletChatMessage(from, text) {
            if (!Array.isArray(state.walletChatMessages)) state.walletChatMessages = [];
            state.walletChatMessages.push({ from, text, time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) });

        function quickWalletChat(text) {

        function localWalletChatParser(text) {
            const msg = String(text || '').toLowerCase();
            if (msg === 'saldo' || msg.includes('cek saldo')) {
                return { type: 'command', reply: `Total saldo aktif: ${formatIDR(state.data.stats.balance || 0)}` };
            }
            const amountMatch = msg.match(/(\d+)\s*(rb|ribu|jt|juta|k)?/i);
            if (!amountMatch) return { type: 'unknown', reply: 'Format belum dikenali. Contoh: makan 25rb pribadi, gaji 5jt bisnis, atau saldo.' };
            let amount = parseInt(amountMatch[1], 10);
            const unit = (amountMatch[2] || '').toLowerCase();
            if (['rb', 'ribu', 'k'].includes(unit)) amount *= 1000;
            if (['jt', 'juta'].includes(unit)) amount *= 1000000;
            
            // Logika deteksi kategori lokal sederhana sesuai default dummy
            let type = /(masuk|gaji|terima|bonus|pemasukan|income|dapat|freelance|nabung)/.test(msg) ? 'income' : 'expense';
            let wallet = getDefaultWalletName();
            getActiveWallets().forEach(w => {
                const keys = [w.wallet, w.label].concat(Array.isArray(w.keywords) ? w.keywords : String(w.keywords || '').split(','));
                if (keys.some(k => k && msg.includes(String(k).toLowerCase()))) wallet = w.wallet;
            });
            let category = 'Lainnya';
            if (/(makan|minum|kopi|bakso|nasi|ayam|mie)/.test(msg)) category = 'Makanan';
            if (/(bensin|grab|gojek|parkir|transport|tol|ojek)/.test(msg)) category = 'Transportasi';
            if (/(listrik|wifi|token|air|pulsa|kuota|internet)/.test(msg)) category = 'Tagihan';
            if (/(gaji|fee|bonus|freelance)/.test(msg)) category = 'Gaji';
            if (/(belanja|shopee|tokopedia|mall)/.test(msg)) category = 'Belanja';
            
            const note = msg.replace(amountMatch[0], '').replace(/(expense|income|masuk|keluar|beli|bayar|dapat|uang)/g, '').trim() || category;
            return { type: 'transaction', transaction: { date: new Date().toISOString().slice(0, 10), type, category, amount, note, wallet }, reply: `✅ Dicatat lokal.\nKantong: ${getWalletLabel(wallet)}\nTipe: ${type === 'income' ? 'Pemasukan' : 'Pengeluaran'}\nKategori: ${category}\nNominal: ${formatIDR(amount)}` };
        }

        async function sendWalletChatMessage() {
            const input = document.getElementById('wallet-chat-input');
            const message = input?.value.trim() || '';
            if (!message) return;
            if (input) input.value = '';
            pushWalletChatMessage('user', message);
            render();
            try {
                const params = new URLSearchParams({ action: 'walletChat', message });
                const response = await fetchWithTimeout(`${CONFIG.API_URL}?${params.toString()}`);
                const data = await response.json();
                if (!data || data.status !== 'success') throw new Error(data?.message || 'Gagal proses chat');
                pushWalletChatMessage('bot', data.result.reply || 'Berhasil diproses.');
                if (data.result.transaction) await fetchDashboardData();
                else render();
            } catch (err) {
                const local = localWalletChatParser(message);
                if (local.transaction) {
                    state.data.transactions.push(local.transaction);
                    const inc = state.data.transactions.filter(t => t.type === 'income').reduce((a, b) => a + Number(b.amount || 0), 0);
                    const exp = state.data.transactions.filter(t => t.type === 'expense').reduce((a, b) => a + Number(b.amount || 0), 0);
                    state.data.stats = { balance: inc - exp, income: inc, expense: exp };
                }
                pushWalletChatMessage('bot', local.reply + '\n\nCatatan: backend belum merespon, jadi ini fallback lokal dashboard.');
                render();
            }
            setTimeout(() => {
                const body = document.getElementById('wallet-chat-body');
                if (body) body.scrollTop = body.scrollHeight;
            }, 50);
        }

        async function setUserActiveUI(userId, phone, active) {
            const params = new URLSearchParams({
                action: 'setUserActive',
                user_id: userId || '',
                phone: phone || '',
                active: active ? 'TRUE' : 'FALSE'
            });

            const saveLocal = () => {
                const user = state.data.users.find(x => x.userId === userId || x.phone === phone);
                if (user) user.active = active;
            };

            try {
                const response = await fetchWithTimeout(`${CONFIG.API_URL}?${params.toString()}`);
                const result = await response.json();
                if (result && result.status === 'success') {
                    saveLocal();
                    showToast("Status user berhasil diubah!", "success");
                    render();
                } else throw new Error(result?.message || "Gagal");
            } catch (err) {
                saveLocal();
                showToast("Status diubah lokal. (Mode Offline)", "warn");
                render();
            }
        }

        // --- FUNGSI CRUD KATEGORI ---
        function openCategoryModal(idx) {
            openModal('categoryForm', { idx });
        }

        async function submitCategoryForm() {
            const idxStr = document.getElementById('cat-idx')?.value;
            const name = document.getElementById('cat-name')?.value.trim();
            const type = document.getElementById('cat-type')?.value;
            const keywordsRaw = document.getElementById('cat-keywords')?.value || '';

            if (!name) return showToast("Nama kategori wajib diisi", "warn");

            const keywords = keywordsRaw.split(',').map(k => k.trim().toLowerCase()).filter(Boolean);
            const newCat = { category: name, type, keywords };

            let updatedCategories = [...(state.data.categories || [])];

            if (idxStr !== '') {
                updatedCategories[parseInt(idxStr)] = newCat;
            } else {
                updatedCategories.push(newCat);
            }

            await saveCategoriesToBackend(updatedCategories);
        }

        async function deleteCategory(idx) {
            if (!confirm("Yakin ingin menghapus kategori ini?")) return;
            let updatedCategories = [...(state.data.categories || [])];
            updatedCategories.splice(idx, 1);
            await saveCategoriesToBackend(updatedCategories);
        }

        async function saveCategoriesToBackend(newCategoriesArray) {
            showToast("Menyimpan Kategori...", "success");

            const params = new URLSearchParams({
                action: 'saveCategories',
                categories_json: JSON.stringify(newCategoriesArray)
            });

            const saveLocal = () => {
                state.data.categories = newCategoriesArray;
            };

            try {
                const response = await fetchWithTimeout(`${CONFIG.API_URL}?${params.toString()}`);
                const result = await response.json();
                if (result && result.status === 'success') {
                    saveLocal();
                    closeModal();
                    showToast("Kategori berhasil disimpan!", "success");
                    render();
                } else throw new Error(result?.message || "Gagal");
            } catch (err) {
                saveLocal();
                closeModal();
                showToast("Kategori tersimpan lokal (Offline/Cek Script).", "warn");
                render();
            }
        }

        // Logic Functions Lainnya
        async function submitDebt() {
            const name = document.getElementById('debt-name').value;
            const type = document.getElementById('debt-type').value;
            const total = document.getElementById('debt-total').value;
            const date = document.getElementById('debt-date').value;
            const dueDate = document.getElementById('debt-due').value;
            const installment = document.getElementById('debt-installment').value;

            if (!name) return showToast("Nama wajib diisi", "warn");
            if (!total || total <= 0) return showToast("Nominal tidak valid", "warn");

            const params = new URLSearchParams({
                action: 'saveDebt',
                name: name,
                type: type,
                total: total,
                date: date,
                due_date: dueDate,
                installment: installment || 0
            });

            showToast("Menyimpan data hutang...", "success");

            try {
                const response = await fetchWithTimeout(`${CONFIG.API_URL}?${params.toString()}`, { timeout: 15000 });
                const result = await response.json();
                if (result && result.status === 'success') {
                    closeModal();
                    showToast("Berhasil menyimpan data peminjam!", "success");
                    fetchDashboardData();
                } else throw new Error(result?.message || "Gagal");
            } catch (err) {
                // Fallback Lokal
                const newId = state.data.debts.length ? Math.max(...state.data.debts.map(d=>d.id)) + 1 : 1;
                state.data.debts.push({
                    id: newId, name, type, date, dueDate, total: Number(total), paid: 0, installment: Number(installment||0)
                });
                closeModal();
                showToast("Berhasil menyimpan lokal (Offline).", "warn");
                render();
            }
        }

        async function submitDebtPayment() {
            const debtId = document.getElementById('payment-debt-id').value;
            const amount = document.getElementById('payment-amount').value;
            const date = document.getElementById('payment-date').value;
            const note = document.getElementById('payment-note').value || 'Cicilan pembayaran';

            if (!amount || amount <= 0) return showToast("Nominal tidak valid", "warn");

            const params = new URLSearchParams({
                action: 'saveDebtPayment',
                debt_id: debtId,
                amount: amount,
                date: date,
                note: note
            });

            showToast("Merekam pembayaran...", "success");

            try {
                const response = await fetchWithTimeout(`${CONFIG.API_URL}?${params.toString()}`, { timeout: 15000 });
                const result = await response.json();
                if (result && result.status === 'success') {
                    closeModal();
                    showToast("Pembayaran berhasil direkam!", "success");
                    fetchDashboardData();
                } else throw new Error(result?.message || "Gagal");
            } catch (err) {
                // Fallback Lokal
                const newPId = state.data.debtPayments.length ? Math.max(...state.data.debtPayments.map(p=>p.id)) + 1 : 1;
                state.data.debtPayments.push({
                    id: newPId, debtId: Number(debtId), date, note, amount: Number(amount)
                });
                const debt = state.data.debts.find(d => d.id === Number(debtId));
                if (debt) debt.paid += Number(amount);
                
                closeModal();
                showToast("Pembayaran terekam lokal (Offline).", "warn");
                render();
            }
        }

        function exportData(format) {
            const csv = "Tanggal,Tipe,Kategori,Catatan,Nominal,Wallet\n" + 
                state.data.transactions.map(t => `${t.date},${t.type},${t.category},${t.note},${t.amount},${t.wallet || 'Pribadi'}`).join("\n");
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `iMersWallet_Report_${new Date().toISOString().slice(0, 10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Mutasi Transaksi Berhasil Diekspor!", "success");
        }

        async function submitManualTransaction() {
            const amount = parseInt(document.getElementById("tx-amount").value);
            const category = document.getElementById("tx-category").value;
            const wallet = document.getElementById("tx-wallet").value;
            const note = document.getElementById("tx-note").value || category;

            if (isNaN(amount) || amount <= 0) {
                return showToast("Nominal tidak valid", "warn");
            }

            const params = new URLSearchParams({
                action: "saveManualTransaction",
                type: state.modalType,
                category,
                amount: String(amount),
                note,
                wallet,
                date: new Date().toISOString().slice(0, 10)
            });

            showToast("Menyimpan transaksi...", "success");

            try {
                const response = await fetchWithTimeout(
                    `${CONFIG.API_URL}?${params.toString()}&ts=${Date.now()}`,
                    { timeout: 20000, cache: "no-store" }
                );

                const text = await response.text();
                let result;

                try {
                    result = JSON.parse(text);
                } catch (jsonErr) {
                    throw new Error("Apps Script tidak mengembalikan JSON valid.");
                }

                if (!result || result.status !== "success") {
                    throw new Error(result?.message || "Gagal simpan transaksi.");
                }

                closeModal();
                showToast("Transaksi berhasil masuk Google Sheet!", "success");

                await fetchDashboardData();

            } catch (err) {
                showToast("Gagal simpan ke Google Sheet. Cek koneksi.", "warn");
            }
        }

        async function submitBudget() {
            const wallet = document.getElementById('bg-wallet')?.value || getDefaultWalletName();
            const cat = document.getElementById('bg-category')?.value || 'Lainnya';
            const limit = parseInt(document.getElementById('bg-limit')?.value || '0');
            const active = document.getElementById('bg-active')?.checked ? 'TRUE' : 'FALSE';

            if (isNaN(limit) || limit <= 0) return showToast("Batas anggaran tidak valid", "warn");

            const params = new URLSearchParams({
                action: 'saveBudget',
                wallet,
                category: cat,
                monthly_limit: limit,
                active
            });

            try {
                const response = await fetchWithTimeout(`${CONFIG.API_URL}?${params.toString()}`, { timeout: 15000 });
                const result = await response.json();
                if (result && result.status === 'success') {
                    closeModal();
                    showToast(`Budget ${cat} berhasil disimpan!`, "success");
                    fetchDashboardData();
                } else throw new Error(result?.message || "Gagal");
            } catch (err) {
                state.data.budgets[cat] = limit;
                if (!Array.isArray(state.data.budgetList)) state.data.budgetList = [];
                state.data.budgetList.push({ wallet, category: cat, monthlyLimit: limit, active: active === 'TRUE' });
                closeModal();
                showToast(`Budget tersimpan lokal. Backend belum merespon.`, "warn");
                render();
            }
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');
            box.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 200);
        }

        window.onload = async () => {
            const desktopWaBtn = document.getElementById('desktop-wa-btn');
            if (desktopWaBtn) desktopWaBtn.href = `https://wa.me/${CONFIG.BOT_NUMBER}`;

            hydrateCachedBranding();

            const loader = document.getElementById('global-loader');
            if (loader) loader.classList.remove('hidden');
            
            await fetchDashboardData(true);

            if (sessionStorage.getItem('authenticated_pin') === 'true') {
                const lockscreen = document.getElementById('pin-lockscreen');
                if (lockscreen) lockscreen.classList.add('hidden');
                render(); 
            } else {
                setTimeout(focusPinInput, 300);
            }
        };
    </script>
</body>
</html>
